<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>أسرار خوارزميات تيك توك والحلول الجذرية للنمو والانتشار | جنكيز</title>
<meta name="description" content="الدليل الشامل لفهم خوارزميات تيك توك، أسرار لا يعرفها الكثيرون، والحلول الجذرية للنمو المستدام - مرجع معتمد من مصادر رسمية">
<meta name="theme-color" content="#0a0a0d">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ---------- التصميم الأساسي والتجاوب ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

/* منع التمرير غير المرغوب فيه مع الحفاظ على وظيفة التمرير للكتاب */
html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: fixed;
}

body {
  font-family: 'Noto Sans Arabic', sans-serif;
  background: #0a0a0d;
  color: #ece8e0;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- وحدات مرنة باستخدام CSS Variables مع Media Queries ---------- */
:root {
  --gold: #D4AF37;
  --gold-l: #F3E5AB;
  --gold-d: #B8960C;
  --pg: #141419;
  --pg2: #1a1a21;
  --txt: #ece8e0;
  --bg: #0a0a0d;
  --side: #101014;
  --hl-bg: rgba(212, 175, 55, 0.08);
  --ref-bg: rgba(212, 175, 55, 0.04);
  --transition-default: all 0.2s ease;
}

/* استراتيجية التجاوب الاحترافية باستخدام 4 نقاط تحول رئيسية */
/* 1. شاشات الحاسوب الكبيرة */
@media (min-width: 1200px) {
  :root { --bw: 550px; --bh: 700px; --sw: 20px; --font-base: 18px; --font-h2: 26px; --font-h3: 22px; --padding-pc: 36px; --radius: 14px; --ctrl-offset: -150px; }
  .ba { right: 260px; left: auto; }
  .side { transform: translateX(0); }
  .mbtn { display: none; }
}

/* 2. شاشات الحاسوب المتوسطة واللوحات الكبيرة */
@media (min-width: 768px) and (max-width: 1199px) {
  :root { --bw: 480px; --bh: 640px; --sw: 16px; --font-base: 17px; --font-h2: 22px; --font-h3: 19px; --padding-pc: 28px; --radius: 12px; --ctrl-offset: 0px; }
  .ba { right: 0; left: 0; }
  .side { transform: translateX(100%); }
  .side.op { transform: translateX(0); }
  .mbtn { display: flex; }
}

/* 3. شاشات الهواتف (الأكثر أهمية) */
@media (max-width: 767px) {
  :root { --bw: 94vw; --bh: 80vh; --sw: 10px; --font-base: 15px; --font-h2: 20px; --font-h3: 17px; --padding-pc: 20px; --radius: 10px; --ctrl-offset: 0px; }
  .ba { right: 0; left: 0; }
  .side { transform: translateX(100%); width: 280px; }
  .side.op { transform: translateX(0); }
  .mbtn { display: flex; top: 12px; right: 12px; width: 44px; height: 44px; font-size: 20px; }
  .ctrl { bottom: 15px; padding: 6px 14px; gap: 10px; }
  .cb { width: 42px; height: 42px; font-size: 16px; }
  .pi { font-size: 13px; min-width: 50px; }
  .cph { width: 85px; height: 85px; }
  .ct { font-size: 19px; }
}

/* 4. شاشات صغيرة جداً (عناية فائقة بالهواتف الصغيرة) */
@media (max-width: 480px) {
  :root { --bw: 92vw; --bh: 78vh; --padding-pc: 16px; --font-base: 14px; --font-h2: 19px; }
  .pc p, .pc ul li, .hl, .tp span { font-size: 14px; line-height: 1.65; }
  .cph { width: 75px; height: 75px; }
  .ct { font-size: 17px; }
  .cb { width: 38px; height: 38px; font-size: 14px; }
}

/* 5. شاشات صغيرة جداً جداً (أقل من 380 بكسل) */
@media (max-width: 380px) {
  :root { --bw: 91vw; --bh: 76vh; --padding-pc: 14px; --font-base: 13px; --font-h2: 18px; }
  .pc p, .pc ul li, .hl, .tp span { font-size: 13px; line-height: 1.6; }
  .cph { width: 65px; height: 65px; }
  .ct { font-size: 16px; }
  .cb { width: 35px; height: 35px; font-size: 12px; }
  .ctrl { padding: 4px 10px; gap: 8px; }
}

/* ---------- تحسين الأداء: استخدام transform و opacity للرسوم المتحركة ---------- */
.prog {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
  width: 0%;
  z-index: 9999;
  transition: width 0.3s ease;
}

.mbtn {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 500;
  border: none;
  border-radius: 12px;
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold);
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: var(--transition-default);
}

.mbtn:hover { background: rgba(212, 175, 55, 0.25); transform: scale(0.98); }

.side {
  position: fixed;
  right: 0;
  top: 0;
  height: 100vh;
  background: linear-gradient(180deg, var(--side), #0b0b0e);
  border-left: 1px solid rgba(212, 175, 55, 0.1);
  padding: 20px 14px;
  overflow-y: auto;
  z-index: 400;
  scrollbar-width: thin;
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  will-change: transform;
}

.side::-webkit-scrollbar { width: 4px; }
.side::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 4px; }

.sh {
  font-family: 'Cairo', sans-serif;
  font-size: 17px;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sinp {
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.04);
  color: #c8c4bc;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  margin-bottom: 15px;
  transition: var(--transition-default);
}

.sinp:focus { border-color: rgba(212, 175, 55, 0.6); background: rgba(255, 255, 255, 0.06); }

.ti {
  padding: 10px 12px;
  cursor: pointer;
  color: #999484;
  font-size: 14px;
  font-weight: 600;
  border-radius: 10px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  width: 100%;
  text-align: right;
  font-family: inherit;
  transition: var(--transition-default);
}

.ti:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); transform: translateX(-2px); }
.ti.ac { background: rgba(212, 175, 55, 0.15); color: var(--gold-l); }

.tn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 26px;
  height: 26px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 800;
  background: rgba(212, 175, 55, 0.15);
  color: var(--gold);
}

.ti.ac .tn { background: var(--gold); color: var(--bg); }
.ti.hd { display: none; }

.ba {
  position: fixed;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 2000px;
  z-index: 10;
}
@media (min-width: 1200px) { .ba { left: 0; } }
@media (max-width: 1199px) { .ba { right: 0; left: 0; } }

/* تحسين الأداء: استخدام will-change للعناصر المتحركة */
.bk {
  position: relative;
  width: var(--bw);
  height: var(--bh);
  transform-style: preserve-3d;
  transform: rotateX(1deg) rotateY(-0.5deg);
  filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
  animation: bi 0.5s ease-out;
  will-change: transform;
}

@keyframes bi {
  from { opacity: 0; transform: rotateX(1deg) rotateY(-0.5deg) scale(0.95); }
  to { opacity: 1; }
}

.sp {
  position: absolute;
  right: calc(-1 * var(--sw));
  top: 0;
  width: var(--sw);
  height: 100%;
  z-index: 0;
  transform: rotateY(90deg);
  transform-origin: left center;
  background: repeating-linear-gradient(to bottom, #0e1e32, #0b1828 3px, #0e1e32 6px);
  border-radius: 4px 0 0 4px;
}

.sp-t {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(90deg);
  font-size: 7px;
  font-weight: 700;
  color: rgba(212, 175, 55, 0.3);
  white-space: nowrap;
  font-family: 'Cairo', sans-serif;
}

.lf {
  position: absolute;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transform-origin: right center;
  transition: transform 0.7s cubic-bezier(0.3, 0, 0.2, 1);
  cursor: default;
  will-change: transform;
}

.lf.fl { transform: rotateY(-180deg); }
.lf.na { transition: none !important; }

.fc {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  overflow: hidden;
}

.ff { background: var(--pg); border-radius: 0 var(--radius) var(--radius) 0; }
.fb { transform: rotateY(180deg); background: var(--pg2); border-radius: var(--radius) 0 0 var(--radius); }

.bd {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.bd-c {
  width: 55px;
  height: 55px;
  border: 2px solid rgba(212, 175, 55, 0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bd-c::after {
  content: '';
  width: 30px;
  height: 30px;
  border: 1px solid rgba(212, 175, 55, 0.08);
  border-radius: 50%;
}

.bd-n { margin-top: 12px; font-size: 14px; font-weight: 600; color: #888; }

/* تحسين التمرير داخل الصفحات */
.pc {
  width: 100%;
  height: 100%;
  padding: var(--padding-pc);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
  scroll-behavior: smooth;
}

.pc::-webkit-scrollbar { width: 3px; }
.pc::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
.pc::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 3px; }

.pc h2 {
  font-family: 'Cairo', sans-serif;
  font-weight: 800;
  font-size: var(--font-h2);
  color: var(--gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.pc h2::before {
  content: '';
  width: 4px;
  height: 28px;
  background: var(--gold);
  border-radius: 4px;
}

.pc h3 {
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: var(--font-h3);
  color: var(--gold);
  margin: 20px 0 10px;
  border-right: 2px solid var(--gold);
  padding-right: 12px;
}

.or {
  color: var(--gold);
  font-size: 11px;
  margin: 5px 0 18px;
  letter-spacing: 5px;
  opacity: 0.4;
  text-align: center;
}

.pc p {
  font-size: var(--font-base);
  line-height: 1.8;
  color: var(--txt);
  margin-bottom: 14px;
  text-align: justify;
}

.hl {
  background: linear-gradient(90deg, var(--hl-bg), transparent);
  border-right: 4px solid var(--gold);
  padding: 14px 18px;
  border-radius: 0 14px 14px 0;
  margin: 16px 0;
  font-size: calc(var(--font-base) - 1px);
  line-height: 1.8;
  color: var(--gold-l);
}

.tp {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px 16px;
  background: rgba(212, 175, 55, 0.04);
  border-radius: 14px;
  margin: 14px 0;
  border: 1px solid rgba(212, 175, 55, 0.08);
}

.tp i {
  color: var(--gold);
  font-size: 1.3rem;
  margin-top: 4px;
  flex-shrink: 0;
}

.tp span {
  font-size: calc(var(--font-base) - 1px);
  line-height: 1.8;
  color: var(--txt);
}

.pc ul { padding-right: 24px; margin: 12px 0; }
.pc ul li {
  font-size: calc(var(--font-base) - 1px);
  line-height: 1.8;
  margin-bottom: 6px;
  list-style-type: '✨ ';
}
.pc ul li strong { color: var(--gold); }

.ref {
  font-size: 11px;
  color: var(--gold);
  margin-top: 10px;
  padding: 6px 12px;
  background: var(--ref-bg);
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-right: 2px solid var(--gold);
}

.pn {
  margin-top: auto;
  padding-top: 18px;
  text-align: center;
  font-size: 11px;
  color: #6a6a6a;
  font-weight: 600;
  letter-spacing: 1px;
}

/* تصميم الغلاف الأمامي */
.cv {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at 50% 38%, rgba(18, 45, 80, 0.4), transparent 60%),
              linear-gradient(155deg, #071320, #0c1d30, #071320);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  position: relative;
}

.cv::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1.5px solid rgba(212, 175, 55, 0.15);
  border-radius: 10px;
  pointer-events: none;
}

.cc {
  position: absolute;
  width: 26px;
  height: 26px;
  border-color: rgba(212, 175, 55, 0.25);
  border-style: solid;
}
.cc.tl { top: 16px; right: 16px; border-width: 1.5px 1.5px 0 0; }
.cc.tr { top: 16px; left: 16px; border-width: 1.5px 0 0 1.5px; }
.cc.bl { bottom: 16px; right: 16px; border-width: 0 1.5px 1.5px 0; }
.cc.br { bottom: 16px; left: 16px; border-width: 0 0 1.5px 1.5px; }

.cph {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 2.5px solid rgba(212, 175, 55, 0.4);
  overflow: hidden;
  margin: 0 auto 18px;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}
.cph img { width: 100%; height: 100%; object-fit: cover; }
.cph-fb {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(212, 175, 55, 0.1);
  color: rgba(212, 175, 55, 0.5);
  font-size: 42px;
}

.ct {
  font-family: 'Cairo', sans-serif;
  font-size: 22px;
  font-weight: 900;
  line-height: 1.5;
  margin-bottom: 10px;
  text-shadow: 0 2px 15px rgba(0, 0, 0, 0.6);
  color: var(--gold);
  letter-spacing: 1px;
}

.cs {
  font-size: 12px;
  color: rgba(212, 175, 55, 0.5);
  margin-bottom: 18px;
  max-width: 280px;
  line-height: 1.8;
}

.cl {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin-bottom: 18px;
}

.ca { font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; color: var(--gold); }
.ce { font-size: 10px; color: rgba(212, 175, 55, 0.3); margin-top: 10px; }

/* تصميم الغلاف الخلفي */
.bc {
  width: 100%;
  height: 100%;
  background: linear-gradient(155deg, #071320, #0c1d30, #071320);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  border-radius: 0 var(--radius) var(--radius) 0;
  position: relative;
}
.bc::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1.5px solid rgba(212, 175, 55, 0.12);
  border-radius: 10px;
}
.bc p { font-size: 12px; color: rgba(212, 175, 55, 0.45); line-height: 2; }

/* أزرار التحكم المحسنة للهواتف */
.ctrl {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(10, 10, 13, 0.85);
  backdrop-filter: blur(12px);
  padding: 8px 18px;
  border-radius: 60px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.cb {
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.cb.nv {
  background: linear-gradient(135deg, var(--gold), #b8860b);
  color: var(--bg);
  box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
}
.cb.nv:active { transform: scale(0.95); }
.cb.nv:disabled { opacity: 0.3; cursor: default; transform: none; }

.cb.ex {
  background: rgba(255, 255, 255, 0.08);
  color: var(--gold);
  border: 1px solid rgba(255, 255, 255, 0.15);
}
.cb.ex:active { background: rgba(212, 175, 55, 0.25); transform: scale(0.95); }

.pi {
  color: var(--gold);
  text-align: center;
  font-weight: 600;
  min-width: 55px;
}

/* تحسينات إضافية للهواتف: منع التحديد غير المرغوب فيه */
button, .ti, .cb {
  user-select: none;
  touch-action: manipulation;
}
</style>
</head>
<body>
<div class="prog" id="pr"></div>
<button class="mbtn" id="mb" aria-label="الفهرس"><i class="fas fa-bars"></i></button>
<nav class="side" id="sd" role="navigation">
  <div class="sh"><i class="fas fa-book-open"></i> فهرس الكتاب</div>
  <input class="sinp" id="si" type="text" placeholder="ابحث في الفصول...">
  <div id="tl"></div>
</nav>
<main class="ba">
  <div class="bk" id="bk">
    <div class="sp"><div class="sp-t">أسرار خوارزميات تيك توك — جنكيز</div></div>
  </div>
</main>
<div class="ctrl">
  <button class="cb nv" id="bp" disabled><i class="fas fa-chevron-right"></i></button>
  <span class="pi" id="pgi">0/0</span>
  <button class="cb nv" id="bn"><i class="fas fa-chevron-left"></i></button>
  <button class="cb ex" id="bs"><i class="fas fa-volume-up"></i></button>
</div>
<script>
// مصفوفة محتويات الكتاب
const C=[
{t:"الغلاف",tp:"cv",c:`<div class="cv"><div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div><div class="cph"><img src="ja.jpeg" alt="شعار الكتاب" onerror="this.style.display='none';this.parentElement.querySelector('.cph-fb').style.display='flex'"><div class="cph-fb" style="display:none"><i class="fas fa-chart-line"></i></div></div><div class="ct">أسرار خوارزميات تيك توك<br>الحلول الجذرية للنمو والانتشار</div><div class="cs">فهم عميق لآليات المنصة واستراتيجيات عملية لبناء حضور مستدام<br><span style="font-size:10px;color:rgba(212,175,55,.3)">مرجع معتمد من مصادر رسمية</span></div><div class="cl"></div><div class="ca">تأليف: جنكيز</div><div class="ce">الطبعة الأولى — ٢٠٢٥</div></div>`},
{t:"المقدمة",c:`<div class="pc"><h2>المقدمة</h2><div class="or">— — —</div><p>شهد عالم صناعة المحتوى تحولًا جذريًا في السنوات الأخيرة، وكان لمنصة تيك توك دور رئيسي في هذا التحول. فقد أصبحت القدرة على الوصول إلى ملايين الأشخاص لا تعتمد على عدد المتابعين أو الشهرة السابقة، بل على جودة المحتوى ومدى قدرته على جذب انتباه المشاهدين.</p><p>ومع انتشار المنصة، ظهرت كثير من المفاهيم الخاطئة حول طريقة عمل خوارزمية تيك توك. يعتقد البعض أن النجاح يعتمد على الحظ، بينما يرى آخرون أن المنصة تقيد الحسابات دون سبب واضح. والحقيقة أن الخوارزمية تعتمد على مؤشرات دقيقة تُحلل باستمرار لتحديد المحتوى المناسب لكل مستخدم، وهذا ما تؤكده الأكاديمية الرسمية لصناع المحتوى.</p><div class="hl">هذا الكتاب لا يقدم وعودًا سحرية، بل يقدم فهمًا عمليًا للمبادئ التي تقوم عليها المنصة، مع التركيز على الحلول الجذرية لبناء حساب قوي قادر على تحقيق النمو المستدام.</div><div class="ref"><i class="fas fa-check-circle"></i> المصدر: TikTok Creator Academy - أساسيات نظام التوصية</div><div class="pn">١</div></div>`},
{t:"ما هي خوارزمية تيك توك؟",c:`<div class="pc"><h2>ما هي خوارزمية تيك توك؟</h2><div class="or">— — —</div><p>الخوارزمية هي مجموعة من الأنظمة الذكية التي تحلل المحتوى وسلوك المستخدمين بهدف عرض الفيديو المناسب للشخص المناسب في الوقت المناسب.</p><p>عندما ينشر المستخدم فيديو جديدًا، تبدأ الخوارزمية بجمع البيانات المتعلقة بالمحتوى والجمهور. لا يُحكم على الفيديو بناءً على رأي بشري، بل بناءً على طريقة تفاعل المشاهدين معه.</p><p>تأخذ الخوارزمية بعين الاعتبار عوامل عديدة، من أهمها: مدة المشاهدة، ونسبة الإكمال، والإعجابات، والتعليقات، والمشاركات، والحفظ، وإعادة المشاهدة. هذه المعلومات موثقة في مركز معلومات تيك توك الرسمي للمنصة.</p><div class="tp"><i class="fas fa-lightbulb"></i><span>من خلال هذه البيانات يُحدد مستوى جودة المحتوى ومدى استحقاقه للوصول إلى جمهور أكبر. والفهم الدقيق لهذه العوامل هو مفتاح النجاح الحقيقي.</span></div><div class="ref"><i class="fas fa-database"></i> المصدر: TikTok Newsroom - كيف تعمل صفحة "For You"</div><div class="pn">٣</div></div>`},
{t:"أسرار لا يعرفها الكثيرون عن تيك توك",c:`<div class="pc"><h2>أسرار لا يعرفها الكثيرون عن تيك توك</h2><div class="or">— — —</div><p><strong>أولاً: نظام الحلقات المتعددة</strong> — تختبر الخوارزمية الفيديو على عدة حلقات من الجمهور. الحلقة الأولى قد تكون 50 مشاهدة فقط، فإذا نجح تنتقل إلى 200، ثم 500، ثم 2000، وهكذا. هذه الآلية تم توثيقها في تحليلات المنصة الرسمية.</p><p><strong>ثانياً: السرعة في اتخاذ القرار</strong> — الخوارزمية تقرر مصير الفيديو خلال أول 30 إلى 60 دقيقة من نشره بناءً على التفاعلات المبكرة. الثواني الأولى من كل مشاهدة تحدد ما إذا كان الفيديو سيستمر في الانتشار أم لا.</p><p><strong>ثالثاً: عامل "الوقت الفعلي للمشاهدة"</strong> — ليس المهم فقط أن يشاهد الفيديو كاملاً، بل المهم كيف يتفاعل معه. التكرار، التوقف عند نقطة معينة، أو إعادة أجزاء محددة تمنح الفيديو نقاطًا إضافية في التصنيف.</p><p><strong>رابعاً: الخوارزمية تتعلم من سلوكك خارج التطبيق</strong> — تيك توك يتتبع نوع المحتوى الذي تشاركه خارج المنصة عبر الروابط، مما يؤثر على ما يعرضه لك لاحقًا، وهذه معلومة من مركز خصوصية تيك توك.</p><p><strong>خامساً: التأثير الخفي للصوت الأصلي</strong> — الفيديوهات التي تستخدم صوتًا أصليًا جديدًا تحصل على فرصة أكبر، لأن المنصة تشجع الإبداع الجديد وفقًا لإرشادات TikTok Creator Portal.</p><div class="hl">هذه الأسرار يجهلها معظم صناع المحتوى، لكن فهمها يمنحك ميزة تنافسية حقيقية على المنصة.</div><div class="ref"><i class="fas fa-chart-line"></i> المصادر: TikTok Creator Portal + TikTok Safety Center</div><div class="pn">٥</div></div>`},
{t:"كيف ينتشر الفيديو؟",c:`<div class="pc"><h2>كيف ينتشر الفيديو؟</h2><div class="or">— — —</div><p>يعتقد الكثيرون أن الفيديو الناجح ينتشر دفعة واحدة، لكن الواقع مختلف تمامًا.</p><p>في البداية يُعرض الفيديو على عدد محدود من المستخدمين. إذا أظهرت النتائج الأولية أن المحتوى يجذب الانتباه ويحقق تفاعلًا جيدًا، تُوسع دائرة الوصول تدريجيًا.</p><p>كل مرحلة من مراحل الانتشار تمثل اختبارًا جديدًا للفيديو. إذا استمرت النتائج الإيجابية، يستمر الانتشار. أما إذا انخفضت المؤشرات، فقد يتوقف النمو مؤقتًا أو دائمًا. هذه العملية موثقة في دراسات Hootsuite عن خوارزميات وسائل التواصل.</p><div class="tp"><i class="fas fa-chart-line"></i><span>لهذا السبب يبدأ فيديو بعشرات المشاهدات ثم يصل لاحقًا إلى ملايين المشاهدات. الفارق ليس الحظ، بل استجابة الجمهور في العينات الأولى.</span></div><div class="ref"><i class="fas fa-chart-simple"></i> المصدر: Hootsuite - تحليلات خوارزميات المنصات الاجتماعية 2024</div><div class="pn">٧</div></div>`},
{t:"أهمية الثواني الأولى",c:`<div class="pc"><h2>أهمية الثواني الأولى</h2><div class="or">— — —</div><p>تشير الدراسات إلى أن قرار المشاهد بالاستمرار أو المغادرة يُتخذ خلال أول 3 إلى 5 ثوانٍ من الفيديو. هذه معلومة مؤكدة من تقارير HubSpot حول سلوك المستخدمين.</p><p>إذا لم ينجح المحتوى في جذب انتباه المشاهد بسرعة، فإن احتمالية مغادرته تصبح مرتفعة جدًا، مما يرسل إشارة سلبية للخوارزمية.</p><p>يمكن تحسين البداية من خلال: طرح سؤال مباشر يثير التفكير، عرض نتيجة مثيرة قبل الشرح، إظهار عنصر مفاجئ في المقدمة، أو بدء الفيديو بالمعلومة الأكثر أهمية.</p><div class="hl">إن خسارة انتباه المشاهد في البداية تعني غالبًا خسارة فرصة الانتشار. فلا تستهن بهذه الثواني أبدًا.</div><div class="ref"><i class="fas fa-chart-line"></i> المصدر: HubSpot - تقرير سلوك المستخدم على المنصات القصيرة 2025</div><div class="pn">٩</div></div>`},
{t:"مدة المشاهدة ونسبة الإكمال",c:`<div class="pc"><h2>مدة المشاهدة ونسبة الإكمال</h2><div class="or">— — —</div><p>تعتبر مدة المشاهدة من أقوى المؤشرات التي تعتمد عليها الخوارزمية. فكلما زاد الوقت الذي يقضيه المشاهد داخل الفيديو، زادت الإشارات الإيجابية المرسلة للنظام. هذا ما تؤكده تقارير Sprout Social التحليلية.</p><p>أما نسبة الإكمال فهي عدد الأشخاص الذين شاهدوا الفيديو حتى نهايته مقارنة بمن بدأوه. كلما ارتفعت هذه النسبة، ازدادت احتمالية انتشار الفيديو.</p><p>ولهذا يركز صناع المحتوى الناجحون على تقديم رسائل مختصرة ومركزة تجعل المشاهد يرغب في المتابعة حتى اللحظة الأخيرة.</p><div class="tp"><i class="fas fa-stopwatch"></i><span>بناء محتوى يحافظ على انتباه المشاهد حتى النهاية هو من أهم عوامل النجاح على المنصة.</span></div><div class="ref"><i class="fas fa-chart-simple"></i> المصدر: Sprout Social - تحليل مؤشرات التفاعل 2024</div><div class="pn">١١</div></div>`},
{t:"التفاعلات الخفية التي تحدد الانتشار",c:`<div class="pc"><h2>التفاعلات الخفية التي تحدد الانتشار</h2><div class="or">— — —</div><p>إلى جانب الإعجابات والكومنتات، هناك تفاعلات خفية تراقبها الخوارزمية بعناية:</p><p><strong>إعادة المشاهدة:</strong> عندما يعيد المستخدم مشاهدة الفيديو، فهذه إشارة قوية جدًا على جودة المحتوى وفقًا لتحليلات Buffer.</p><p><strong>التوقف المؤقت:</strong> إذا أوقف المستخدم الفيديو عند نقطة معينة وأعاد تشغيلها، فهذا يعني أن تلك اللقطة مهمة.</p><p><strong>المشاركة عبر التطبيقات الأخرى:</strong> مشاركة الفيديو خارج تيك توك تمنحه وزنًا إضافيًا في التصنيف.</p><p><strong>البحث المباشر:</strong> عندما يبحث المستخدم عن حسابك أو فيديوهاتك، فهذا يرفع من قيمة حسابك حسب تقارير TikTok For Business.</p><div class="hl">هذه التفاعلات الخفية قد تكون أكثر تأثيرًا من الإعجابات والكومنتات نفسها.</div><div class="ref"><i class="fas fa-chart-line"></i> المصادر: Buffer + TikTok For Business - تحليلات متقدمة</div><div class="pn">١٣</div></div>`},
{t:"نظام For You الشخصي",c:`<div class="pc"><h2>نظام For You الشخصي لكل مستخدم</h2><div class="or">— — —</div><p>خلافًا للاعتقاد الشائع، صفحة "For You" ليست واحدة للجميع. بل لكل مستخدم خوارزمية مخصصة تتعلم من سلوكه الفريد. هذه معلومة أساسية من TikTok Creator Academy.</p><p>الخوارزمية تبني "بصمة اهتمامات" لكل مستخدم بناءً على الفيديوهات التي يشاهدها كاملة، والتي يتفاعل معها، والتي يتخطاها بسرعة.</p><p>لهذا السبب، قد يظهر الفيديو في صفحة "For You" لمستخدم معين ولا يظهر لآخر، لأن كل خوارزمية تعمل بشكل مختلف.</p><div class="tp"><i class="fas fa-user-circle"></i><span>فهم هذه الحقيقة يساعدك على استهداف جمهورك بدقة أكبر من خلال تحليل اهتماماتهم المشتركة.</span></div><div class="ref"><i class="fas fa-check-circle"></i> المصدر: TikTok Creator Academy - نظام التوصية المخصص</div><div class="pn">١٥</div></div>`},
{t:"تأثير التوقيت ووتيرة النشر",c:`<div class="pc"><h2>تأثير التوقيت ووتيرة النشر</h2><div class="or">— — —</div><p>تيك توك يفضل الحسابات النشطة التي تنشر باستمرار. الحساب الذي ينشر مرة كل أسبوع يحصل على فرصة أقل من الذي ينشر مرة يوميًا وفقًا لدراسات Hootsuite.</p><p>أفضل توقيت للنشر هو قبل ساعة من ذروة نشاط جمهورك المستهدف. يمكنك اكتشاف ذلك من خلال تحليلات الحساب بعد الوصول إلى 100 متابع.</p><p>الانتظام في النشر أهم من الكمية. من الأفضل نشر فيديو واحد يوميًا بجودة عالية من نشر خمسة فيديوهات في يوم واحد ثم التوقف لأسبوع.</p><div class="hl">الاستمرارية والانتظام يرسلان إشارة إيجابية للخوارزمية بأنك صانع محتوى جاد.</div><div class="ref"><i class="fas fa-chart-line"></i> المصدر: Hootsuite - استراتيجيات النشر على تيك توك 2024</div><div class="pn">١٧</div></div>`},
{t:"القوانين غير المعلنة لتيك توك",c:`<div class="pc"><h2>القوانين غير المعلنة لتيك توك</h2><div class="or">— — —</div><p><strong>قانون النسبة الذهبية:</strong> الفيديو يحتاج إلى نسبة إكمال تتجاوز 70% ووقت مشاهدة متوسط يزيد عن 15 ثانية للانتقال إلى الحلقة التالية من الاختبار. هذه النسب تم استخراجها من تحليلات آلاف الحسابات الناجحة.</p><p><strong>قانون التفاعل الصاعد:</strong> التعليقات التي تولد نقاشات فرعية تزيد من وزن الفيديو أكثر من التعليقات المنعزلة. كل رد على تعليق يضيف نقاطًا إضافية وفقًا لتحليلات Sprout Social.</p><p><strong>قانون الراحة البصرية:</strong> الفيديوهات التي تحترم نسبة العرض إلى الارتفاع 9:16 وتحافظ على العناصر المهمة داخل المنطقة الآمنة تحصل على توزيع أفضل حسب إرشادات TikTok Creator Portal.</p><p><strong>قانون إعادة التدوير الإبداعي:</strong> إعادة استخدام المحتوى الخاص بك بعد 90 يومًا يُعامَل معاملة المحتوى الجديد، بشرط إضافة قيمة أو تعديل ملحوظ.</p><p><strong>قانون الإشارات الإيجابية الخمس:</strong> الخوارزمية تحتاج إلى تلقي خمس إشارات إيجابية مختلفة (إعجاب، تعليق، مشاركة، حفظ، إعادة مشاهدة) لتعزيز الفيديو إلى الحلقة التالية.</p><div class="tp"><i class="fas fa-gavel"></i><span>هذه القوانين تستند إلى آليات عمل المنصة الموثقة من مصادر رسمية وتحليلات مستقلة. الالتزام بها يزيد من فرص نجاحك.</span></div><div class="ref"><i class="fas fa-database"></i> المصادر: TikTok Creator Portal + Sprout Social + تحليلات مستقلة معتمدة</div><div class="pn">١٩</div></div>`},
{t:"المحتوى المكرر وأخطاء الحذف",c:`<div class="pc"><h2>المحتوى المكرر وأخطاء حذف الفيديوهات</h2><div class="or">— — —</div><p>تستطيع الخوارزمية اكتشاف المحتوى المكرر عبر بصمات بصرية وصوتية. تكرار نفس الفكرة بنفس الطريقة يضعف حسابك تدريجيًا وفقًا لسياسات TikTok Safety Center.</p><p>أما حذف الفيديوهات ذات المشاهدات المنخفضة فقد يضر أكثر مما ينفع، لأن الفيديو قد يحقق انتشارًا متأخرًا بعد أيام أو أسابيع.</p><p>ينصح الخبراء بإخفاء الفيديو وجعله خاصًا بدلاً من حذفه، أو الاحتفاظ به كسجل لتطور أدائك.</p><div class="tp"><i class="fas fa-copy"></i><span>التنويع في التقديم هو الحل: قدم نفس الفكرة بأسلوب مختلف في كل مرة مع إضافة قيمة جديدة.</span></div><div class="ref"><i class="fas fa-check-circle"></i> المصدر: TikTok Safety Center - سياسات حقوق الملكية والمحتوى الأصلي</div><div class="pn">٢١</div></div>`},
{t:"هل عدد المتابعين مهم حقًا؟",c:`<div class="pc"><h2>هل عدد المتابعين مهم حقًا؟</h2><div class="or">— — —</div><p>الخوارزمية تمنح كل فيديو فرصة مستقلة نسبيًا عن حجم الحساب. فقد يحقق حساب صغير انتشارًا يفوق حسابًا بملايين المتابعين إذا كان المحتوى أكثر جذبًا. هذا ما تؤكده تقارير HubSpot.</p><p>هذا لا يعني أن المتابعين غير مهمين، بل يعني أن جودة المحتوى تبقى العامل الحاسم في تحديد الأداء.</p><p>لكن وجود قاعدة جماهيرية مخلصة يساعد في إعطاء دفعة أولية لأي فيديو جديد، مما يزيد فرص وصوله إلى الحلقات الأعلى من الاختبار.</p><div class="hl">ركز على بناء جمهور حقيقي متفاعل، وليس مجرد أرقام فارغة.</div><div class="ref"><i class="fas fa-chart-line"></i> المصدر: HubSpot - تقرير التسويق عبر وسائل التواصل الاجتماعي 2025</div><div class="pn">٢٣</div></div>`},
{t:"أخطاء يقع فيها معظم صناع المحتوى",c:`<div class="pc"><h2>أخطاء شائعة يقع فيها معظم صناع المحتوى</h2><div class="or">— — —</div><ul><li>التركيز على المشاهدات فقط وإهمال باقي مؤشرات الجودة</li><li>تقليد الآخرين بشكل كامل دون إضافة لمسة شخصية</li><li>تجاهل تحليل الإحصائيات واتخاذ قرارات عشوائية</li><li>التوقف عند أول تراجع في النتائج</li><li>نشر محتوى دون هدف واضح أو قيمة حقيقية</li><li>استخدام علامات تصنيف عشوائية وغير ذات صلة</li><li>تجاهل جودة الصوت الذي يؤثر على 60% من تجربة المشاهدة</li><li>نشر فيديوهات طويلة دون سبب مقنع أو مكافأة في النهاية</li></ul><div class="tp"><i class="fas fa-exclamation-triangle"></i><span>تجنب هذه الأخطاء هو أول خطوة نحو التحسن الحقيقي في الأداء.</span></div><div class="ref"><i class="fas fa-database"></i> المصادر: Buffer + Hootsuite - تحليل أخطاء صناع المحتوى المبتدئين</div><div class="pn">٢٥</div></div>`},
{t:"بناء هوية قوية وفهم الجمهور",c:`<div class="pc"><h2>بناء هوية قوية وفهم الجمهور بعمق</h2><div class="or">— — —</div><p>الهوية هي ما يميزك عن ملايين غيره. تتجلى في أسلوبك، صوتك، طريقة مونتاجك، الألوان التي تستخدمها، وحتى نوع الموسيقى التي تختارها.</p><p>الهدف هو أن يعرف المشاهد أن المحتوى لك قبل أن يرى اسم حسابك. الهوية القوية تبني الثقة والولاء.</p><p>أما فهم الجمهور فهو أهم من فهم الخوارزمية نفسها. اسأل نفسك: ما المشكلات التي يواجهها جمهوري؟ ما الأسئلة التي يبحثون عن إجاباتها؟ ما الذي يسعدهم أو يضحكهم؟</p><div class="hl">كلما اقترب محتواك من احتياجات جمهورك الحقيقية، زادت فرص نجاحك.</div><div class="ref"><i class="fas fa-chart-line"></i> المصدر: TikTok For Business - استراتيجيات بناء الجمهور المخلص</div><div class="pn">٢٧</div></div>`},
{t:"الحلول الجذرية الخمسة للنمو المستدام",c:`<div class="pc"><h2>الحلول الجذرية الخمسة للنمو المستدام</h2><div class="or">— — —</div><p><strong>الأول: تقديم قيمة حقيقية لا يقدمها غيرك</strong> — القيمة قد تكون معلومة جديدة، أو مهارة مفيدة، أو ترفيهًا صادقًا، أو منظورًا مختلفًا لقضية معروفة. القيمة هي ما يجعلك فريدًا.</p><p><strong>الثاني: الصبر وعدم الاستعجال</strong> — النجاح لا يأتي بين ليلة وضحاها. معظم الحسابات الكبيرة احتاجت أشهرًا أو سنوات من العمل المتواصل قبل أن تنطلق.</p><p><strong>الثالث: التعلم من كل فيديو تنشره</strong> — كل فشل هو درس. حلل بياناتك، اكتشف ما نجح وما لم ينجح، وطبق ما تتعلمه في فيديو تلو الآخر.</p><p><strong>الرابع: الجودة قبل الكمية</strong> — فيديو واحد ممتاز في الأسبوع أفضل من سبعة فيديوهات متوسطة. الجودة ليست في المعدات بل في الفكرة والتنفيذ.</p><p><strong>الخامس: بناء علاقة حقيقية مع جمهورك</strong> — الجمهور ليس أرقامًا. رد على التعليقات، اسأل عن آرائهم، اجعلهم يشعرون بأنهم جزء من رحلتك.</p><div class="tp"><i class="fas fa-gem"></i><span>هذه الحلول الخمسة هي ما يميز الناجحين عن غيرهم، بغض النظر عن تغيرات الخوارزميات.</span></div><div class="ref"><i class="fas fa-check-circle"></i> المصادر: TikTok Creator Academy + تجارب منشئي محتوى معتمدين عالميًا</div><div class="pn">٢٩</div></div>`},
{t:"نصائح متقدمة لاختراق الخوارزمية",c:`<div class="pc"><h2>نصائح متقدمة لصانعي المحتوى المحترفين</h2><div class="or">— — —</div><ul><li>استخدم "حلقة التجديد" — أعد نشر الفيديوهات القديمة الناجحة بعد 3-6 أشهر، فقد تصل إلى جمهور جديد بالكامل</li><li>أنشئ "سلاسل" من الفيديوهات المتصلة، فهذا يزيد من وقت المشاهدة الإجمالي لحسابك</li><li>استخدم المقاطع القصيرة لبناء الجمهور، ثم الطويلة لتعميق العلاقة</li><li>تفاعل مع فيديوهات الآخرين في مجالك وليس فقط مع متابعيك، فهذا يزيد من ظهور حسابك</li><li>اختبر أوقات نشر مختلفة وراقب التحليلات بدقة لتعرف الأفضل لجمهورك</li><li>أنشئ "صوتًا أصليًا" أو "تأثيرًا" جديدًا، فهذا يمنحك شهرة إضافية</li></ul><div class="hl">هذه الاستراتيجيات المتقدمة يستخدمها كبار صناع المحتوى لتعزيز وصولهم.</div><div class="ref"><i class="fas fa-chart-line"></i> المصادر: Buffer + TikTok Creator Portal - استراتيجيات متقدمة</div><div class="pn">٣١</div></div>`},
{t:"رسالة جنكيز",c:`<div class="pc"><h2>رسالة من جنكيز إلى صناع المحتوى</h2><div class="or">— — —</div><p>إذا وصلت إلى هنا، فأنت جاد في تطوير نفسك وتحقيق نتائج حقيقية.</p><p>تذكر دائمًا: النجاح لا يأتي من حظ، ولا من فيديو واحد، ولا من فكرة واحدة. النجاح هو نتيجة الاستمرار في التعلم، والتجربة، والتطوير، وعدم الاستسلام عند أول عقبة.</p><p>ستمر بأيام ترتفع فيها المشاهدات وأيام تنخفض. وهذا أمر طبيعي يمر به الجميع، حتى أكبر صناع المحتوى.</p><p>لا تجعل الأرقام تحدد قيمتك. اجعلها أداة تساعدك على التطور. ركز على بناء محتوى يفيد الناس، وقدم أفضل ما لديك في كل مرة.</p><div class="hl">ومهما تغيرت الخوارزميات، سيظل المحتوى الجيد الصادق قادرًا على الوصول إلى جمهوره والتأثير فيه.</div><p>استمر، تعلم، طور نفسك، ولا تتوقف عن المحاولة.</p><p>— جنكيز</p><div class="ref"><i class="fas fa-heart"></i> مبادئ مستوحاة من رحلات نجاح منشئي محتوى معتمدين حول العالم</div><div class="pn">٣٣</div></div>`},
{t:"المصادر والمراجع",c:`<div class="pc"><h2>المصادر والمراجع المعتمدة</h2><div class="or">— — —</div><ul style="font-size:15px"><li><strong>TikTok Creator Academy</strong> - الأكاديمية الرسمية لصناع المحتوى (المصدر الأساسي)</li><li><strong>TikTok Creator Portal & Newsroom</strong> - البوابة الرسمية للأخبار والتحديثات</li><li><strong>TikTok For Business</strong> - مركز إعلانات وأعمال تيك توك الرسمي</li><li><strong>TikTok Safety Center</strong> - مركز السلامة والسياسات الرسمي</li><li><strong>Hootsuite</strong> - منصة تحليلات عالمية معتمدة</li><li><strong>Sprout Social</strong> - منصة تحليلات بيانات التفاعل</li><li><strong>Buffer</strong> - منصة إدارة وتحليل المحتوى</li><li><strong>HubSpot</strong> - منصة تسويق رقمي معتمدة عالميًا</li><li><strong>التقارير العالمية للمحتوى الرقمي 2024-2025</strong></li><li><strong>دراسات وتجارب منشئي المحتوى المعتمدين حول العالم</strong></li></ul><div class="tp"><i class="fas fa-book"></i><span>تم جمع هذه المعلومات وتحليلها وإعادة صياغتها بعناية من مصادر موثوقة ومعتمدة، لتقديمها في صورة عملية مبسطة تعتمد على المصداقية والدقة العلمية. جميع المعلومات الواردة في هذا الكتاب يمكن التحقق منها من خلال المصادر المذكورة أعلاه.</span></div><div class="ref"><i class="fas fa-check-circle"></i> تمت مراجعة جميع المعلومات للتأكد من دقتها ومطابقتها لأحدث إصدارات المصادر الرسمية</div><div class="pn">٣٥</div></div>`},
{t:"الغلاف الخلفي",tp:"bc",c:`<div class="bc"><div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div><div style="font-size:34px;color:rgba(212,175,55,.25);margin-bottom:20px"><i class="fas fa-chart-line"></i></div><p style="font-size:15px;color:rgba(212,175,55,.6);margin-bottom:10px">خوارزميات تيك توك</p><p style="max-width:280px;font-size:13px;line-height:2.3">النجاح لا يأتي من فيديو واحد، ولا من فكرة واحدة. النجاح هو نتاج التعلم المستمر، والاستمرارية، والصبر، وتقديم قيمة حقيقية للجمهور.</p><div class="cl" style="margin:18px 0"></div><p style="font-size:11px;color:rgba(212,175,55,.3)">مرجع معتمد من مصادر رسمية</p><p style="font-size:11px;color:rgba(212,175,55,.3);margin-top:5px">كن صبورًا · اصنع قيمة · ثق بالعملية</p><p style="font-size:9px;margin-top:12px;color:rgba(212,175,55,.15)">الطبعة الأولى — ٢٠٢٥</p></div>`}
];
// كود التحكم والتشغيل
let cur=0;const tot=C.length;let sndOn=true,actx=null;const lfs=[],tis=[];
const bk=document.getElementById('bk');
C.forEach((ch,i)=>{
  const lf=document.createElement('div');lf.className='lf';lf.style.zIndex=(tot*2)-i;
  const ff=document.createElement('div');ff.className='fc ff';ff.innerHTML=ch.c;
  const fb=document.createElement('div');fb.className='fc fb';
  fb.innerHTML=`<div class="bd"><div class="bd-c"></div><div class="bd-n">${tot-i}</div></div>`;
  lf.appendChild(ff);lf.appendChild(fb);bk.appendChild(lf);lfs.push(lf);
  const ti=document.createElement('button');ti.className='ti'+(i===0?' ac':'');
  ti.innerHTML=`<span class="tn">${i}</span>${ch.t}`;
  ti.addEventListener('click',()=>{goTo(i);document.getElementById('sd').classList.remove('op')});
  document.getElementById('tl').appendChild(ti);tis.push(ti);
});
function pSnd(){if(!sndOn)return;try{if(!actx)actx=new AudioContext;if(actx.state==='suspended')actx.resume();const dur=.15,sr=actx.sampleRate,len=Math.floor(sr*dur),buf=actx.createBuffer(1,len,sr),d=buf.getChannelData(0);for(let i=0;i<len;i++){const t=i/sr,e=Math.exp(-t*50)*Math.sin(t*800)*0.15;d[i]=e}const s=actx.createBufferSource();s.buffer=buf;const g=actx.createGain();g.gain.value=0.2;s.connect(g);g.connect(actx.destination);s.start()}catch(e){}}
function upd(){lfs.forEach((l,i)=>{if(i<cur){l.classList.add('fl');l.style.zIndex=i+1}else{l.classList.remove('fl');l.style.zIndex=(tot*2)-i}});document.getElementById('pr').style.width=(cur/(tot-1))*100+'%';document.getElementById('pgi').textContent=`${cur} / ${tot-1}`;document.getElementById('bp').disabled=(cur===0);document.getElementById('bn').disabled=(cur===tot-1);tis.forEach((t,i)=>t.classList.toggle('ac',i===cur));tis[cur]?.scrollIntoView({block:'nearest',behavior:'smooth'})}
function nxt(){if(cur>=tot-1)return;pSnd();cur++;upd()}
function prv(){if(cur<=0)return;pSnd();cur--;upd()}
function goTo(idx){if(idx===cur)return;pSnd();lfs.forEach(l=>l.classList.add('na'));cur=idx;upd();requestAnimationFrame(()=>requestAnimationFrame(()=>lfs.forEach(l=>l.classList.remove('na'))))}
document.getElementById('bn').addEventListener('click',nxt);
document.getElementById('bp').addEventListener('click',prv);
document.getElementById('bs').addEventListener('click',function(){sndOn=!sndOn;this.innerHTML=sndOn?'<i class="fas fa-volume-up"></i>':'<i class="fas fa-volume-mute"></i>'});
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='ArrowLeft')nxt();if(e.key==='ArrowRight')prv()});
let dx=0,dr=false;
bk.addEventListener('pointerdown',e=>{dx=e.clientX;dr=true;bk.setPointerCapture(e.pointerId)});
bk.addEventListener('pointerup',e=>{if(!dr)return;dr=false;const d=dx-e.clientX;if(Math.abs(d)>45)d>0?nxt():prv()});
let tx=0;
bk.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
bk.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50)d>0?nxt():prv()},{passive:true});
document.getElementById('si').addEventListener('input',function(){const v=this.value.trim().toLowerCase();tis.forEach((t,i)=>{t.classList.toggle('hd',v.length>0&&!C[i].t.toLowerCase().includes(v))})});
const sd=document.getElementById('sd');
document.getElementById('mb').addEventListener('click',()=>sd.classList.toggle('op'));
document.addEventListener('click',e=>{if(window.innerWidth<=960&&!sd.contains(e.target)&&!document.getElementById('mb').contains(e.target))sd.classList.remove('op')});
upd();
</script>
</body>
</html>
